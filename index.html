<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DivineStamp Pvt Ltd builds reliable industrial infrastructure solutions with precision engineering.">
  <title>DivineStamp Industries | Precision in every process</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <style>
    :root {
      --bg-dark: #11161e;
      --text: #f4f5f7;
      --muted: #c9ced5;
      --accent: #f25423;
      --accent-soft: #fdf1eb;
      --glass: rgba(17, 22, 30, 0.52);
      --glass-strong: rgba(17, 22, 30, 0.72);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #b08f93 0%, #382935 48%, #1c0f11 100%);
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .shell {
      width: min(1180px, 100%);
      min-height: 82vh;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
      background: #0f1115;
    }

    .hero-image {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(12, 16, 23, 0.58) 0%, rgba(12, 16, 23, 0.67) 50%, rgba(12, 16, 23, 0.88) 100%),
        url("https://images.unsplash.com/photo-1567789884554-0b844b597180?auto=format&fit=crop&w=1920&q=80");
      background-size: cover;
      background-position: center;
      filter: saturate(0.9);
      transform: scale(1.01);
    }

    .topbar {
      position: relative;
      z-index: 2;
      margin: 1.5rem;
      padding: 0.95rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--glass);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-size: 0.95rem;
      letter-spacing: 0.2px;
      font-weight: 500;
      white-space: nowrap;
    }

    nav ul {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 1.35rem;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 0.5rem 1.1rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-contact {
      background: var(--accent);
      color: #fff;
    }

    .btn-contact:hover {
      background: #e84918;
    }

    .content {
      position: relative;
      z-index: 2;
      height: calc(82vh - 96px);
      min-height: 490px;
      display: flex;
      align-items: flex-end;
      padding: 0 2.4rem 2.6rem;
    }

    .copy {
      max-width: 550px;
      background: linear-gradient(90deg, var(--glass-strong), transparent);
      padding: 1.2rem 1.1rem 1.1rem 0.9rem;
      border-radius: 2px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.4rem);
      line-height: 0.98;
      margin-bottom: 1.1rem;
      letter-spacing: -1px;
    }

    .sub {
      color: var(--muted);
      max-width: 470px;
      font-size: 1.12rem;
      line-height: 1.45;
      margin-bottom: 1.55rem;
    }

    .actions {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn-light {
      background: #fff;
      color: #1a2029;
    }

    .btn-light:hover {
      background: #edf0f4;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .btn-ghost:hover {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 900px) {
      .topbar {
        flex-wrap: wrap;
      }

      nav {
        width: 100%;
      }

      nav ul {
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.8rem;
      }

      .content {
        padding: 0 1.2rem 1.6rem;
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 0.8rem;
      }

      .topbar {
        margin: 0.8rem;
      }

      nav ul {
        font-size: 0.74rem;
      }

      .sub {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="hero-image" role="img" aria-label="Industrial production facility"></div>

    <header class="topbar">
      <p class="brand">DivineStamp Industries</p>
      <nav aria-label="Primary">
        <ul>
          <li>About Us</li>
          <li>Our Team</li>
          <li>Expertise</li>
          <li>Careers</li>
          <li>News</li>
        </ul>
      </nav>
      <button class="btn btn-contact">Contact</button>
    </header>

    <section class="content">
      <div class="copy">
        <p class="eyebrow"><span class="dot"></span>Built to perform</p>
        <h1>Precision in<br>every process</h1>
        <p class="sub">Delivering reliable industrial infrastructure with efficiency, safety, and scale for modern manufacturing.</p>
        <div class="actions">
          <button class="btn btn-light">About Us</button>
          <button class="btn btn-ghost">Explore Our Company</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
